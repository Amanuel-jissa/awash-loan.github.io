<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a2670" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Awash Loan Calc" />
  <title>Amanuel Tsega</title>
  <style>
    :root {
      --primary: #0a2670;
      --accent: #f4a24c;
      --card: rgba(255,255,255,0.94);
      --text: #14213d;
      --muted: #5b6475;
      --shadow: 0 10px 30px rgba(0,0,0,0.12);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
    }

    .wrap {
      width: 100%;
      max-width: 520px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 18px 18px;
      backdrop-filter: blur(4px);
    }

    .hero {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .hero img {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      object-fit: cover;
      box-shadow: 0 8px 18px rgba(10,38,112,0.18);
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 1.5rem;
      line-height: 1.15;
    }

    .sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.35;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    label {
      display: block;
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 14px 14px;
      border: 1px solid #d2d8e5;
      border-radius: 14px;
      font-size: 1rem;
      background: #fff;
      color: var(--text);
    }

    input:focus, select:focus {
      outline: 2px solid rgba(244,162,76,0.35);
      border-color: var(--accent);
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 14px 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: var(--primary);
      color: white;
    }

    .secondary {
      background: #edf1f8;
      color: var(--text);
    }

    .results {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }

    .result {
      background: #f7f9fd;
      border: 1px solid #e4e9f2;
      border-radius: 16px;
      padding: 14px;
    }

    .k {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 5px;
    }

    .v {
      font-weight: 800;
      font-size: 1.2rem;
      word-break: break-word;
    }

    .note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .small {
      font-size: 0.88rem;
      color: var(--muted);
      margin-top: 12px;
      line-height: 1.45;
    }

    @media (min-width: 700px) {
      .grid.two {
        grid-template-columns: 1fr 1fr;
      }
      .results {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }
  </style>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />

</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hero">
        <div>
          <h1>Amanuel Tsega</h1>
          <p class="sub">Property of amanuel tsega.</p>
        </div>
      </div>

      <div class="grid two">
        <div>
          <label for="loanAmount">የብድር መጠን </label>
          <input id="loanAmount" type="number" inputmode="decimal" placeholder="60000000" value="60000000" />
        </div>

        <div>
          <label for="annualRate">ዓመታዊ የወለድ መጠን (%)</label>
          <input id="annualRate" type="number" inputmode="decimal" step="0.01" placeholder="18.5" value="18.5" />
        </div>

        <div>
          <label for="months">የመክፈያ ጊዜ</label>
          <input id="months" type="number" inputmode="numeric" placeholder="60" value="60" />
        </div>

        <div>
          <label for="loanType">Calculation method</label>
          <select id="loanType">
            <option value="amortized" selected>Amortized / Declining balance</option>
            <option value="flat">Flat / Simple interest</option>
          </select>
        </div>
      </div>

      <div class="buttons">
        <button class="primary" onclick="calculate()">አስላ</button>
        <button class="secondary" onclick="resetForm()">Reset</button>
      </div>

      <div class="results">
        <div class="result">
          <div class="k">ወርሃዊ payment</div>
          <div class="v" id="monthlyPayment">—</div>
        </div>
        <div class="result">
          <div class="k">ጠቅላላ</div>
          <div class="v" id="totalPaid">—</div>
        </div>
        <div class="result">
          <div class="k">ጠቅላላ interest</div>
          <div class="v" id="totalInterest">—</div>
        </div>
      </div>

      <div class="note" id="explanation">
        Enter the loan amount, annual interest rate, and number of months, then tap Calculate.
      </div>

      <div class="small">
        Amortized = equal monthly installments on a declining balance.<br>
        Flat = simple interest on the original principal for the full term.
      </div>
    </div>
  </div>

  <script>
    function formatETB(value) {
      if (!isFinite(value)) return "—";
      return new Intl.NumberFormat("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }).format(value) + " ETB";
    }

    function calculate() {
      const P = parseFloat(document.getElementById("loanAmount").value);
      const annualRate = parseFloat(document.getElementById("annualRate").value);
      const months = parseInt(document.getElementById("months").value, 10);
      const type = document.getElementById("loanType").value;

      if (!(P > 0) || !(annualRate >= 0) || !(months > 0)) {
        alert("Please enter a valid loan amount, interest rate, and number of months.");
        return;
      }

      let monthlyPayment = 0;
      let totalPaid = 0;
      let totalInterest = 0;
      let explanation = "";

      if (type === "amortized") {
        const r = annualRate / 100 / 12;

        if (r === 0) {
          monthlyPayment = P / months;
        } else {
          monthlyPayment = (P * r) / (1 - Math.pow(1 + r, -months));
        }

        totalPaid = monthlyPayment * months;
        totalInterest = totalPaid - P;
        explanation = "Using the amortized formula: M = P·r / (1 - (1 + r)^(-n)), where r is the monthly interest rate and n is the number of months.";
      } else {
        totalInterest = P * (annualRate / 100) * (months / 12);
        totalPaid = P + totalInterest;
        monthlyPayment = totalPaid / months;
        explanation = "Using flat interest: total interest = principal × annual rate × years, then total paid ÷ months.";
      }

      document.getElementById("monthlyPayment").textContent = formatETB(monthlyPayment);
      document.getElementById("totalPaid").textContent = formatETB(totalPaid);
      document.getElementById("totalInterest").textContent = formatETB(totalInterest);
      document.getElementById("explanation").textContent = explanation;
    }

    function resetForm() {
      document.getElementById("loanAmount").value = "60000000";
      document.getElementById("annualRate").value = "18.5";
      document.getElementById("months").value = "60";
      document.getElementById("loanType").value = "amortized";
      document.getElementById("monthlyPayment").textContent = "—";
      document.getElementById("totalPaid").textContent = "—";
      document.getElementById("totalInterest").textContent = "—";
      document.getElementById("explanation").textContent = "Enter the loan amount, annual interest rate, and number of months, then tap Calculate.";
    }

    calculate();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>

</body>
</html>
